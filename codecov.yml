# Codecov configuration for redhat-developer/rhdh-plugins
# Reference: https://docs.codecov.com/docs/codecov-yaml
#
# Feature umbrella: RHDHPLAN-851
# Epic: RHIDP-11862 — Unit Test Coverage for RHDH Plugins Repository
#
# Each workspace uploads coverage with its own flag (e.g., lightspeed,
# orchestrator). Flags are created dynamically by the upload step in CI;
# default_rules apply to all of them automatically.

codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "40...80"

  status:
    project:
      default:
        target: auto
        threshold: 100%
        informational: true
        only_pulls: false
        paths:
          - "workspaces/*/plugins/*/src/**"
    patch:
      default:
        target: auto
        threshold: 100%
        informational: true
        paths:
          - "workspaces/*/plugins/*/src/**"

comment:
  layout: "header, diff, flags, footer"
  behavior: default
  require_changes: false
  show_carryforward_flags: true

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/index.ts"
  - "**/__fixtures__/**"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/node_modules/**"
  - "**/setupTests.*"
  - "**/playwright.config.ts"
  - "**/scripts/**"
  - "**/docs/**"

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 100%
      - type: patch
        target: auto
        threshold: 100%
