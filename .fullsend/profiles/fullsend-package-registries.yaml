---
id: fullsend-package-registries
display_name: Fullsend Package Registries
description: npm, PyPI, and Go module registries for dependency installation
category: data
endpoints:
  - host: registry.npmjs.org
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
    allow_encoded_slash: true
  - host: registry.yarnpkg.com
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
  - host: repo.yarnpkg.com
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
  - host: pypi.org
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
  - host: files.pythonhosted.org
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
  - host: proxy.golang.org
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
  - host: sum.golang.org
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
  - host: storage.googleapis.com
    port: 443
    protocol: rest
    access: read-only
    enforcement: enforce
binaries:
  - "**/npm"
  - "**/npx"
  - "**/yarn"
  - "**/yarnpkg"
  - "**/corepack"
  - "**/pnpm"
  - "**/node"
  - "**/pip"
  - "**/pip3"
  - "**/python"
  - "**/python3"
  - "**/python3.*"
  - "**/go"
  - "**/pre-commit"
