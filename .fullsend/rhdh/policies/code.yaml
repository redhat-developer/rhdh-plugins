---
version: 1

# Sandbox policy for the code and fix agents.
#
# Based on the upstream code policy with allow_encoded_slash enabled for
# registry.npmjs.org. Yarn encodes the slash in scoped package URLs as %2F;
# without this flag the OpenShell L7 proxy denies those requests.

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "api.anthropic.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "*.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/claude"
      - path: "**/node"

  github_api:
    name: github-api
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/gh"
      - path: "**/git"
      - path: "**/node"
      - path: "**/pre-commit"

  gitleaks_releases:
    name: gitleaks-releases
    endpoints:
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "objects.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "release-assets.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/pre-commit"

  package_registries:
    name: package-registries
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
        allow_encoded_slash: true
      - host: "registry.yarnpkg.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "pypi.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "files.pythonhosted.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "proxy.golang.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "sum.golang.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "storage.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/npm"
      - path: "**/npx"
      - path: "**/yarn"
      - path: "**/yarnpkg"
      - path: "**/pnpm"
      - path: "**/node"
      - path: "**/pip"
      - path: "**/pip3"
      - path: "**/python"
      - path: "**/python3"
      - path: "**/python3.*"
      - path: "**/go"
      - path: "**/pre-commit"
