---
version: 1

# Sandbox policy for the code agent.
#
# forked-from: fullsend v0.17.0 scaffold
# last-synced: 2026-06-16
# Based on upstream code policy with additions:
#   - repo.yarnpkg.com endpoint in package_registries (corepack downloads
#     yarn binary from repo.yarnpkg.com, not registry.yarnpkg.com)
#   - corepack binary in package_registries
#   - allow_encoded_slash on registry.npmjs.org (yarn scoped packages use
#     @scope%2Fpkg URLs; without this the L7 proxy rejects and retries)
#
# Grants network access the code agent needs beyond the base sandbox:
#   - Vertex AI (global inference + GCP auth token exchange)
#   - GitHub API (gh/git only — curl intentionally excluded to prevent
#     disallowedTools bypass via raw HTTP with the injected GH_TOKEN)
#   - gitleaks releases (fallback download if not pre-installed in image)
#   - npm/yarn/pnpm/PyPI/Go registries (running tests may pull dev dependencies)
#   - pre-commit binary needs github (clone hook repos), package registries
#     (pip install hook deps), and GitHub releases (hook binaries like gitleaks)

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "api.anthropic.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "*.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/claude"
      - path: "**/node"

  github_api:
    name: github-api
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/gh"
      - path: "**/git"
      - path: "**/node"
      - path: "**/pre-commit"

  gitleaks_releases:
    name: gitleaks-releases
    endpoints:
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "objects.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "release-assets.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/pre-commit"

  package_registries:
    name: package-registries
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
        allow_encoded_slash: true
      - host: "registry.yarnpkg.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "repo.yarnpkg.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "pypi.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "files.pythonhosted.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "proxy.golang.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "sum.golang.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "storage.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: "**/npm"
      - path: "**/npx"
      - path: "**/yarn"
      - path: "**/yarnpkg"
      - path: "**/corepack"
      - path: "**/pnpm"
      - path: "**/node"
      - path: "**/pip"
      - path: "**/pip3"
      - path: "**/python"
      - path: "**/python3"
      - path: "**/python3.*"
      - path: "**/go"
      - path: "**/pre-commit"
