name: Sync Codecov components by support level

# Keeps the `component_management` block of codecov.yml in sync with plugin
# support levels (spec.support) declared in rhdh-plugin-export-overlays.
#
# - On a schedule (and on demand) it regenerates the block and opens a PR if a
#   plugin's support level changed (e.g. tech-preview -> generally-available).
# - On pull requests touching the relevant files it fails if codecov.yml has
#   drifted from the overlay metadata, so manual edits cannot desync it.
#
# See scripts/generate-codecov-components.sh and docs/codecov-support-levels.md.

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - codecov.yml
      - scripts/generate-codecov-components.sh
      - .github/workflows/sync-codecov-components.yml

permissions:
  contents: read

concurrency:
  group: sync-codecov-components-${{ github.ref }}
  cancel-in-progress: true

env:
  OVERLAY_REPO: redhat-developer/rhdh-plugin-export-overlays

jobs:
  check:
    name: Check codecov.yml matches overlay metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout rhdh-plugins
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout overlay metadata
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ env.OVERLAY_REPO }}
          path: overlay
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: |
            workspaces

      - name: Check for drift against overlay metadata
        run: ./scripts/generate-codecov-components.sh --check --overlay overlay

  sync:
    name: Open PR to sync codecov components
    if: github.event_name != 'pull_request' && github.repository == 'redhat-developer/rhdh-plugins'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout rhdh-plugins
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          token: ${{ secrets.RHDH_BOT_TOKEN }}
          fetch-depth: 1

      - name: Checkout overlay metadata
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ env.OVERLAY_REPO }}
          path: overlay
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: |
            workspaces

      - name: Regenerate codecov component_management block
        run: ./scripts/generate-codecov-components.sh --write --overlay overlay

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          token: ${{ secrets.RHDH_BOT_TOKEN }}
          base: main
          branch: automation/sync-codecov-components
          commit-message: "chore: sync codecov components with overlay support levels"
          title: "chore: sync codecov components with overlay support levels"
          body: |
            A plugin's support level (`spec.support`) changed in
            [`${{ env.OVERLAY_REPO }}`](https://github.com/${{ env.OVERLAY_REPO }}),
            so the `component_management` block in `codecov.yml` was regenerated.

            Review the diff to see which plugins moved between the **GA**,
            **Tech-Preview**, **Community**, and **Dev-Preview** components.

            Generated by [Sync Codecov components ${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          signoff: true
          delete-branch: true
          add-paths: |
            codecov.yml
