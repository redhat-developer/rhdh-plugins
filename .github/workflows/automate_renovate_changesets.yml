name: Automate Renovate changeset
on:
  pull_request_target:
    paths:
      - '.github/workflows/automate_renovate_changesets.yml'
      - '**/yarn.lock'

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    if: (github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'dependabot[bot]') && github.repository == 'redhat-developer/rhdh-plugins' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 2
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RHDH_BOT_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/ # Needed for auth

      - name: Configure Git
        run: |
          git config --global user.email 146280956+rhdh-bot@users.noreply.github.com
          git config --global user.name 'Github changeset workflow'

      - name: Generate changesets
        run: node ./scripts/ci/generate-bump-changesets.js
