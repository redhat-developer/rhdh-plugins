plugins:
  - package: ./plugins/cost-management/dist/red-hat-developer-hub-backstage-plugin-cost-management
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-cost-management:
            appIcons:
              - name: costManagementIcon
                importName: ResourceOptimizationIcon
            dynamicRoutes:
              - path: /cost-management
                importName: ResourceOptimizationPage
                menuItem:
                  icon: costManagementIcon
                  text: Optimizations
              - path: /cost-management/ocp
                importName: OpenShiftPage
                menuItem:
                  icon: costManagementIcon
                  text: OpenShift
            menuItems:
              cost-management:
                parent: cost-management
                priority: 10
              cost-management.ocp:
                parent: cost-management
                priority: 20
              cost-management:
                icon: costManagementIcon
                title: Cost management
                priority: 100
