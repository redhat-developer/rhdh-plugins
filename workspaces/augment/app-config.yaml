app:
  title: Red Hat Developer Hub
  baseUrl: http://localhost:3000

organization:
  name: Red Hat

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

auth:
  environment: development
  providers:
    guest: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template]
  locations:
    - type: file
      target: ../../examples/templates/agent-template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/templates/langgraph-agent-template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/templates/crewai-agent-template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/templates/tool-template.yaml
      rules:
        - allow: [Template]

augment:
  provider: kagenti
  security:
    mode: 'none'
    adminUsers:
      - 'user:default/admin'
      - 'user:default/guest'
  llamaStack:
    baseUrl: ${AUGMENT_LLAMA_STACK_URL:-http://localhost:8321}
    model: ${AUGMENT_MODEL:-gemini/models/gemini-2.5-flash}
    skipTlsVerify: ${AUGMENT_SKIP_TLS:-false}
  kagenti:
    baseUrl: ${KAGENTI_BASE_URL:-http://localhost:8080}
    namespace: ${KAGENTI_NAMESPACE:-team1}
    auth:
      tokenEndpoint: ${KAGENTI_TOKEN_ENDPOINT:-http://localhost:8180/realms/kagenti/protocol/openid-connect/token}
      clientId: ${KAGENTI_CLIENT_ID:-kagenti-api}
      clientSecret: ${KAGENTI_CLIENT_SECRET}
    showAllNamespaces: true
    skipTlsVerify: false
    verboseStreamLogging: true
  skillsMarketplace:
    baseUrl: ${SKILLS_MARKETPLACE_URL:-https://backstage-developer-hub-rhdh.apps.cluster-6crhb.6crhb.sandbox1011.opentlc.com/api/skill-marketplace}
    agentImage: ghcr.io/redhat-et/docsclaw:latest
    advisorUrl: https://skill-advisor-smp-agents.apps.cluster-6crhb.6crhb.sandbox1011.opentlc.com
    llmBaseUrl: ${LLM_BASE_URL:-https://llamastack-llamastack.apps.cluster-6crhb.6crhb.sandbox1011.opentlc.com/v1}
    llmModel: ${LLM_MODEL:-gemini/models/gemini-2.5-pro}
    runtimes:
      - id: docsclaw
        name: DocsClaw
        description: ConfigMap-driven agentic runtime
        image: ghcr.io/redhat-et/docsclaw:latest
        language: Go
        footprint: ~10 MiB per pod
        features: [tool-use, a2a-protocol, skill-discovery, multi-provider]
        status: available
      - id: zeroclaw
        name: ZeroClaw
        description: Provider-agnostic agent runtime with 30+ channels
        image: ghcr.io/pavelanni/zeroclaw:0.7.0-beta-minimal
        language: Rust
        footprint: ~5 MiB per pod
        features: [multi-channel, a2a-protocol, rust-native]
        status: available
      - id: openfang
        name: OpenFang
        description: Agent operating system built in Rust
        language: Rust
        features: [agent-os, autonomous, rust-native]
        status: coming-soon
