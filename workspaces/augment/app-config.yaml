app:
  title: Red Hat Developer Hub
  baseUrl: http://localhost:3000

organization:
  name: Red Hat

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

auth:
  environment: development
  providers:
    guest: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template]
  locations:
    - type: file
      target: ../../examples/templates/agent-template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/templates/langgraph-agent-template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/templates/crewai-agent-template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/templates/tool-template.yaml
      rules:
        - allow: [Template]

augment:
  provider: kagenti
  security:
    mode: 'none'
    adminUsers:
      - 'user:default/admin'
      - 'user:default/guest'
  llamaStack:
    baseUrl: ${AUGMENT_LLAMA_STACK_URL:-https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com}
    model: ${AUGMENT_MODEL:-gemini/models/gemini-2.5-flash}
    skipTlsVerify: ${AUGMENT_SKIP_TLS:-true}
  kagenti:
    baseUrl: ${KAGENTI_BASE_URL:-https://kagenti-api-kagenti-system.apps.ocp.v7hjl.sandbox2288.opentlc.com}
    namespace: ${KAGENTI_NAMESPACE:-team1}
    auth:
      tokenEndpoint: ${KAGENTI_TOKEN_ENDPOINT:-https://keycloak-keycloak.apps.ocp.v7hjl.sandbox2288.opentlc.com/realms/kagenti/protocol/openid-connect/token}
      clientId: ${KAGENTI_CLIENT_ID:-kagenti-api}
      clientSecret: ${KAGENTI_CLIENT_SECRET}
    showAllNamespaces: true
    skipTlsVerify: true
    verboseStreamLogging: true
