app:
  title: Red Hat Developer Hub
  baseUrl: http://localhost:3000

organization:
  name: Red Hat

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

auth:
  environment: development
  providers:
    guest: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]

augment:
  provider: kagenti
  security:
    mode: 'none'
    adminUsers:
      - 'user:default/admin'
      - 'user:default/guest'
  llamaStack:
    baseUrl: ${AUGMENT_LLAMA_STACK_URL:-https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com}
    model: ${AUGMENT_MODEL:-vllm-inference/gpt-oss-120b}
    skipTlsVerify: ${AUGMENT_SKIP_TLS:-true}
  kagenti:
    baseUrl: https://kagenti-api-kagenti-system.apps.ocp.v7hjl.sandbox2288.opentlc.com
    namespace: team1
    auth:
      tokenEndpoint: https://keycloak-keycloak.apps.ocp.v7hjl.sandbox2288.opentlc.com/realms/kagenti/protocol/openid-connect/token
      clientId: kagenti-api
      clientSecret: ${KAGENTI_CLIENT_SECRET}
    showAllNamespaces: true
    skipTlsVerify: true
