apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: x2a-conversion-project-template
  title: Legacy-to-Ansible Conversion Project
  description: Initiate a conversion of a legacy infrastructure automation (e.g. Chef, Puppet, Salt, Powershell) into a new Ansible Playbook repository.
spec:
  type: service

  parameters:
    - title: Job name and description
      required:
        - inputMethod
      ui:order:
        - inputMethod
        - name
        - description
        - abbreviation
        - ownedByGroup
        - csvContent
      properties:
        inputMethod:
          title: Input method
          type: string
          default: manual
          enum:
            - manual
            - csv
          enumNames:
            - Manual entry
            - CSV upload
          ui:widget: radio
      dependencies:
        inputMethod:
          allOf:
            - if:
                properties:
                  inputMethod:
                    const: manual
              then:
                required:
                  - name
                  - abbreviation
                properties:
                  name:
                    title: Name
                    type: string
                    description: Unique name of the conversion project
                    ui:autofocus: true
                  description:
                    title: Description
                    type: string
                    description: Description of the project
                    ui:widget: textarea
                    ui:options:
                      rows: 3
                  abbreviation:
                    title: Abbreviation
                    type: string
                    default: 'myprj'
                    description: Abbreviation of the project to ease the project identification in the target repository.
                    pattern: '^([a-zA-Z][a-zA-Z0-9]*)(-[a-zA-Z0-9]+)*$'
                    maxLength: 5
                    minLength: 1
                  ownedByGroup:
                    title: Owned by group
                    type: string
                    description: Optional - The user group that will own the project. Make sure the group has either x2a.user or x2a.user admin (update) permission. Leave empty to use the creator (you) as owner.
                    ui:field: MyGroupsPicker
            - if:
                properties:
                  inputMethod:
                    const: csv
              then:
                required:
                  - csvContent
                properties:
                  csvContent:
                    title: CSV file
                    type: string
                    format: data-url
                    description: |
                      Upload a UTF-8 encoded CSV file. Duplicates are skipped, so re-uploads are safe.

                      Required: name, abbreviation, sourceRepoUrl, sourceRepoBranch, targetRepoBranch.

                      Optional: description, ownedByGroup, targetRepoUrl.

                      [Download sample CSV](/x2a/download/sample-projects.csv)

                    ui:options:
                      accept: '.csv'

    - title: Source and target repositories
      ui:order:
        - inputMethod
        - repoAuthentication
        - sourceRepoUrl
        - sourceRepoBranch
        - areTargetAndSourceRepoShared
        - targetRepoUrl
        - targetRepoBranch
      properties:
        # Carried over from page 1 as hidden so dependencies can reference it
        inputMethod:
          type: string
          ui:widget: hidden
      dependencies:
        inputMethod:
          allOf:
            - if:
                properties:
                  inputMethod:
                    const: manual
              then:
                required:
                  - sourceRepoUrl
                  - sourceRepoBranch
                  - targetRepoBranch
                properties:
                  sourceRepoUrl:
                    title: Conversion source repository
                    description: |
                      The Owner should be your SCM (Source Code Management) username. The repository name should be a name that already exists in your SCM account and contains the legacy code (like Chef cookbook, Puppet module, Salt, Powershell DSC, etc.) to convert.
                    type: string
                    ui:field: RepoUrlPicker
                    ui:options:
                      requestUserCredentials:
                        secretsKey: SRC_USER_OAUTH_TOKEN
                      allowedHosts:
                        # This is to be updated per production deployment along the auth in the app-config.yaml file
                        - github.com
                        - gitlab.com
                        - bitbucket.org
                  sourceRepoBranch:
                    title: Conversion source repository branch
                    type: string
                    description: The branch of the source repository to use for the conversion.
                    default: 'main'
                  areTargetAndSourceRepoShared:
                    title: Use the same repository for target and source
                    type: boolean
                    description: If checked, the target repository will be the same as the source repository.
                    default: true
                  # Can be replaced by RepoBranchPicker but it does not work nicely. https://backstage.io/docs/features/software-templates/writing-templates#the-repository-branch-picker
                  targetRepoBranch:
                    title: Conversion target repository branch
                    type: string
                    description: The branch of the target repository to use for the conversion.
                    default: 'main'
            - if:
                properties:
                  inputMethod:
                    const: csv
              then:
                required:
                  - repoAuthentication
                properties:
                  repoAuthentication:
                    type: string
                    description: |
                      Authenticate with each SCM provider referenced in the CSV.
                    ui:field: RepoAuthentication
                    ui:options:
                      csvFieldName: csvContent

        areTargetAndSourceRepoShared:
          allOf:
            - if:
                properties:
                  areTargetAndSourceRepoShared:
                    const: false
              then:
                properties:
                  targetRepoUrl:
                    title: Conversion target repository
                    description: |
                      The Owner should be your SCM (Source Code Management) username. The repository name should be a name that already exists in your SCM account. It will be populated by converted Ansible sources and intermediary artifacts.
                    type: string
                    ui:field: RepoUrlPicker
                    ui:options:
                      requestUserCredentials:
                        secretsKey: TGT_USER_OAUTH_TOKEN
                      allowedHosts:
                        # This is to be updated per production deployment along the auth in the app-config.yaml file
                        - github.com
                        - gitlab.com
                        - bitbucket.org

    - title: Conversion parameters
      properties:
        userPrompt:
          title: User prompt
          type: string
          description: User prompt for the conversion project initialization phase.
          ui:widget: textarea
          ui:options:
            rows: 3

  steps:
    - id: createProject
      name: Create Project
      action: x2a:project:create
      input:
        inputMethod: ${{ parameters.inputMethod }}
        csvContent: ${{ parameters.csvContent }}
        name: ${{ parameters.name }}
        description: ${{ parameters.description }}
        abbreviation: ${{ parameters.abbreviation }}
        ownedByGroup: ${{ parameters.ownedByGroup }}
        sourceRepoUrl: ${{ parameters.sourceRepoUrl }}
        sourceRepoBranch: ${{ parameters.sourceRepoBranch }}
        areTargetAndSourceRepoShared: ${{ parameters.areTargetAndSourceRepoShared }}
        targetRepoUrl: ${{ parameters.targetRepoUrl }}
        targetRepoBranch: ${{ parameters.targetRepoBranch }}
        userPrompt: ${{ parameters.userPrompt }}

  # Outputs are displayed to the user after a successful execution of the template.
  output:
    links:
      - title: Manage the project
        url: ${{ steps.createProject.output.nextUrl }}
    text:
      - title: Results
        content: |
          Successfully created: ${{ steps.createProject.output.successCount }} project(s). Skipped (already exist): ${{ steps.createProject.output.skippedCount }}. Errors: ${{ steps.createProject.output.errorCount }}.
