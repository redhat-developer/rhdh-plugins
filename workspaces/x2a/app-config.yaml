app:
  title: X2Ansible Convertor
  baseUrl: http://localhost:3000

organization:
  name: Red Hat

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  # information on the format
  # auth:
  #   keys:
  #     - secret: ${BACKEND_SECRET}
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    # host: 127.0.0.1
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin:
      - http://localhost:3000
      - http://localhost:6274
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is stored in app-config.production.yaml
  database:
    client: better-sqlite3
    connection: ':memory:'
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir

  # MCP Actions: expose x2a tools to AI clients (Cursor, Claude, etc.)
  actions:
    pluginSources:
      - 'catalog'
      - 'software-catalog-mcp-tool'
      - 'x2a-mcp-extras'
  # Enable following for non-DCR flow for MCP tools
  # auth:
  #   externalAccess:
  #     - type: static
  #       options:
  #         token: ${MCP_TOKEN}
  #         subject: mcp-clients
  #       accessRestrictions:
  #         - plugin: mcp-actions

proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  ### A typical reason to do this is to handle HTTPS and CORS for internal services.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local' # Alternatives - 'external'
  generator:
    runIn: 'docker' # Alternatives - 'local'
  publisher:
    type: 'local' # Alternatives - 'googleGcs' or 'awsS3'. Read documentation for using alternatives.

# Use redirect flow instead of popup; fixes "Missing session cookie" on refresh
# when the popup and main window have different cookie contexts
#enableExperimentalRedirectFlow: true

integrations:
  # Needed for SCM provider detection in the x2a plugin
  # See https://backstage.io/docs/integrations/github/locations#configuration
  # The tokens are not needed for provider detection, only the hostnames.
  # To access a SCM (pull, push), the plugin authenticates via OAuth through the auth: providers, not through integration tokens.
  github:
    - host: github.com
    #- host: github.mycompany.com # GitHub Enterprise on a custom domain
    #  apiBaseUrl: https://github.mycompany.com/api/v3
  gitlab:
    - host: gitlab.com
    #- host: gitlab.internal.io # Self-hosted GitLab
    #  apiBaseUrl: https://gitlab.internal.io/api/v4
  bitbucketCloud:
    - host: bitbucket.org

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  environment: development
  # Uncomment to enable OAuth DCR for MCP clients (user-identity auth).
  # Narrow allowedRedirectUriPatterns to match your specific needs.
  # Requires either @backstage/plugin-auth or x2a-dcr frontend plugin.
  experimentalDynamicClientRegistration:
    enabled: true
    allowedRedirectUriPatterns:
      # Keeping those generic for development. Narrow to specific patterns in production.
      - cursor://*
      - https://*
      - http://*
      # - http://localhost:*
  providers:
    # See https://backstage.io/docs/auth/guest/provider
    guest: {}
    gitlab:
      development:
        # Create an OAuth app on https://gitlab.com/-/user_settings/applications
        clientId: ${AUTH_GITLAB_CLIENT_ID}
        clientSecret: ${AUTH_GITLAB_CLIENT_SECRET}
        audience: https://gitlab.com
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
    bitbucket:
      # Follow https://backstage.io/docs/auth/bitbucket/provider/
      development:
        clientId: ${AUTH_BITBUCKET_CLIENT_ID:-}
        clientSecret: ${AUTH_BITBUCKET_CLIENT_SECRET:-}
        signIn:
          resolvers:
            # The usernameMatchingUserEntityName resolver is not working for Bitbucket.
            # Cannot make the bitbucket to provide user's email.
            # See the org.yaml file for an example of how to use the usernameMatchingUserEntityAnnotation resolver.
            - resolver: usernameMatchingUserEntityAnnotation

scaffolder: {}
  # see https://backstage.io/docs/features/software-templates/configuration for software template options

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    # Local example organizational data
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]
    # x2a Create Project template
    - type: file
      target: ../../plugins/scaffolder-backend-module-x2a/templates/conversion-project-template.yaml
      rules:
        - allow: [Template]

kubernetes:
  # see https://backstage.io/docs/features/kubernetes/configuration for kubernetes configuration options

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # Set to false to disable RBAC checks
  enabled: true
  rbac:
    policies-csv-file: ../../examples/example-rbac-policy.csv
    policyFileReload: true
    pluginsWithPermission:
      - x2a
    admin:
      users:
        - name: user:default/mareklibra
        - name: user:default/elai-shalev

# X2A Configuration
x2a:
  kubernetes:
    # Kubernetes namespace where jobs will be created
    namespace: ${X2A_KUBERNETES_NAMESPACE:-default}
    # X2A convertor container image
    image: ${X2A_KUBERNETES_IMAGE:-quay.io/x2ansible/x2a-convertor}
    imageTag: ${X2A_KUBERNETES_IMAGE_TAG:-latest}
    # Auto-delete completed jobs after 24 hours (86400 seconds)
    ttlSecondsAfterFinished: ${X2A_KUBERNETES_TTL_SECONDS:-86400}
    # Resource requests and limits for job pods
    resources:
      requests:
        cpu: ${X2A_KUBERNETES_CPU_REQUEST:-500m}
        memory: ${X2A_KUBERNETES_MEMORY_REQUEST:-1Gi}
      limits:
        cpu: ${X2A_KUBERNETES_CPU_LIMIT:-2000m}
        memory: ${X2A_KUBERNETES_MEMORY_LIMIT:-4Gi}
  credentials:
    # LLM provider credentials as environment variables
    # Generic key-value pairs passed to the job container
    # Use env var names expected by your LLM provider (x2a-convertor container)
    llm:
      # LLM_MODEL is required - defaults to anthropic.claude-v2 if not set
      LLM_MODEL: ${LLM_MODEL:-anthropic.claude-v2}
      # Example for AWS Bedrock with bearer token:
      AWS_REGION: ${AWS_REGION}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}
      # Example for AWS Bedrock with IAM credentials:
      #AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      #AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # Example for OpenAI:
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # OPENAI_MODEL: ${OPENAI_MODEL}
    # Ansible Automation Platform credentials (optional - can be provided by users at runtime)
    # If not provided here, users must supply AAP credentials when creating projects
    # Use EITHER oauthToken OR username+password
    aap:
      url: ${AAP_URL:-https://aap.example.com}
      orgName: ${AAP_ORG_NAME:-MyOrganization}
      # Option 1: OAuth token
      # oauthToken: ${AAP_OAUTH_TOKEN:-your-oauth-token}
      # Option 2: Username and password
      username: ${AAP_USERNAME}
      password: ${AAP_PASSWORD}
      # skipSSLVerification: false   # Set to true for dev/test environments with self-signed certs
