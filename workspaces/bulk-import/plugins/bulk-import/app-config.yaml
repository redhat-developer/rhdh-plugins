dynamicPlugins:
  frontend:
    red-hat-developer-hub.backstage-plugin-bulk-import:
      # Legacy exports require `module: Legacy` — they are not available on the default module.
      appIcons:
        - name: bulkImportIcon
          module: Legacy
          importName: BulkImportIcon
      dynamicRoutes:
        - path: /bulk-import
          importName: BulkImportPage
          module: Legacy
          menuItem:
            icon: bulkImportIcon
            text: Bulk import
